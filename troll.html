<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Yok Öyle Bir Dünya</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0f1e;touch-action:none;overscroll-behavior:none;-webkit-user-select:none;user-select:none}
#game{width:100%;height:100%}
canvas{display:block}
</style>
</head>
<body>
<div id="game"></div>
<script>
'use strict';
// ---- Telegram WebApp ----
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { try { tg.ready(); tg.expand && tg.expand(); tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch(e){} }
if (tg && tg.themeParams && tg.themeParams.bg_color) document.body.style.background = tg.themeParams.bg_color;

// ---- Sabitler ----
const W = 800, H = 450;
// dokunmatikte butonlar icin tuval altina kontrol seridi eklenir
const TOUCH = ('ontouchstart' in window);
const CH = TOUCH ? 560 : 450;
const SPEED = 240, JUMPV = 540, GRAV = 1500; // ayni yukseklik (~97px), daha hizli yay
const PCOL = 0x4a5878; // platform rengi (tuzaklar da ayni renk — bilerek)

// ---- Kayit ----
function sv(k,v){ try{ localStorage.setItem('yod_'+k, v); }catch(e){} }
function ld(k,d){ try{ const v = localStorage.getItem('yod_'+k); return v===null ? d : +v; }catch(e){ return d; } }
let DEATHS = ld('deaths', 0);

// ---- Test kumu: troll.html?sandbox=1|2|3 (mekanik testleri, ilerleme kaydetmez) ----
const SBX = (()=>{ const m = /[?&]sandbox=(\d)/.exec(location.search); return (m && +m[1]>=1 && +m[1]<=3) ? +m[1] : 0; })();

// ---- Seedli RNG (bolum no = seed, ayni bolum hep ayni) ----
function mulberry32(a){ return function(){ a|=0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a>>>15, 1|a); t = t + Math.imul(t ^ t>>>7, 61|t) ^ t; return ((t ^ t>>>14) >>> 0) / 4294967296; }; }

// ---- Dokular (kodla cizim, harici asset yok) ----
function mkTextures(s){
  if (s.textures.exists('spike')) return;
  const g = s.add.graphics();
  g.fillStyle(0xff5d6e); g.fillTriangle(0,18,10,0,20,18); g.generateTexture('spike',20,18); g.clear();
  g.fillStyle(0x53e6a8); g.fillRoundedRect(0,0,26,30,6);
  g.fillStyle(0x0d1522); g.fillRect(13,9,4,6); g.fillRect(20,9,4,6);
  g.generateTexture('hero',26,30); g.clear();
  g.fillStyle(0xe6b84c); g.fillRect(0,0,34,48);
  g.fillStyle(0x9a7526); g.fillRect(4,4,26,40);
  g.fillStyle(0xffe9a8); g.fillCircle(25,26,3);
  g.generateTexture('door',34,48); g.clear();
  g.fillStyle(0xffffff,0.22); g.fillCircle(95,95,95);
  g.fillStyle(0xffffff,0.55); g.fillCircle(95,95,76);
  g.fillStyle(0xffffff,1); g.fillCircle(95,95,56);
  g.generateTexture('spot',190,190);
  g.destroy();
}

// ---- Ana sahne (tek sahne, restart ile döner — yeni sahne yaratılmaz) ----
class Play extends Phaser.Scene {
  constructor(){ super('play'); }

  create(){
    mkTextures(this);
    // ?lvl=N ile dogrudan bolum acilabilir (sadece ilk kurulumda gecerli)
    const qm = /[?&]lvl=(\d+)/.exec(location.search);
    this.lvl = this.registry.get('lvl') || (qm ? Math.max(1,+qm[1]) : 0) || ld('lvl',1);
    this.registry.set('lvl', this.lvl);
    this.dead=false; this.won=false; this.rev=false; this.gdir=1;
    this.darkOn=false; this.doorFlee=null; this.door=null;
    this.updaters=[]; this.jq=0; this.coyote=0;
    this.walls=[]; this.consumed=[];
    this.lagMs=0; this.inputQ=[]; this.lagRing=null; this.jpress=false;
    this.recBuf=[]; this.shadows=[]; this._shadowSpecs=[]; this._shadowRec=false;
    this.jumpMul=1; this._lock=0; this._lockCd=0; this._gvcd=0;
    this.paused=false; this.menuEls=[];
    this.physics.resume(); this.time.paused=false;
    if (this.lvl > ld('max',1)) sv('max',this.lvl);

    this.physics.world.setBounds(0,-250,W,H+500);
    this.physics.world.setBoundsCollision(true,true,false,false);
    this.solids = this.add.group();

    // oyuncu
    this.player = this.physics.add.image(46,378,'hero').setDepth(2);
    this.player.body.setSize(22,28);
    this.player.setCollideWorldBounds(true);
    this.player.body.setGravityY(GRAV);

    // bolumu kur
    if (SBX) SANDBOX[SBX-1](this);
    else if (this.lvl <= 15) LEVELS[this.lvl-1](this);
    else if (SPECIALS[this.lvl]) SPECIALS[this.lvl](this);
    else genLevel(this,this.lvl);

    // platform carpismasi (+ basma tetikleyicileri: coken/kuculen)
    this.physics.add.collider(this.player, this.solids, (pl,ob)=>{
      if (ob._onStand){
        const std = this.gdir>0 ? (pl.body.touching.down && ob.body.touching.up)
                                : (pl.body.touching.up && ob.body.touching.down);
        if (std) ob._onStand(ob);
      }
    });

    // UI
    this.add.text(12,10,SBX?'TEST KUMU '+SBX:'BÖLÜM '+this.lvl,{fontFamily:'monospace',fontSize:'18px',fontStyle:'bold',color:'#ffffff'}).setDepth(100).setAlpha(.92);
    this.deathTxt = this.add.text(W-12,10,'💀 '+DEATHS,{fontFamily:'monospace',fontSize:'18px',fontStyle:'bold',color:'#ffffff'}).setOrigin(1,0).setDepth(100).setAlpha(.92);

    // girisler
    this.cursors = this.input.keyboard.createCursorKeys();
    this.keys = this.input.keyboard.addKeys('W,A,S,D,SPACE');
    this.input.addPointer(3);
    this.touch = {l:false, r:false};
    if (TOUCH) this.mkButtons();
    this.mkPause();
  }

  // ---- Duraklatma menusu ----
  mkPause(){
    const hit = this.add.circle(W/2,26,28,0xffffff,0.001).setDepth(99).setInteractive();
    this.add.text(W/2,24,'⏸',{fontFamily:'monospace',fontSize:'24px',color:'#9fb3d9'}).setOrigin(.5).setDepth(100).setAlpha(.85);
    hit.on('pointerdown', ()=>this.togglePause());
    this.input.keyboard.on('keydown-ESC', ()=>this.togglePause());
    this.input.keyboard.on('keydown-P',   ()=>this.togglePause());
  }

  togglePause(){
    if (this.dead || this.won) return;
    if (this.paused) this.closeMenu(); else this.openMenu(false);
  }

  clearMenuEls(){ this.menuEls.forEach(e=>e.destroy()); this.menuEls=[]; }

  openMenu(sel){
    if (!this.paused){
      this.paused = true;
      this.physics.pause(); this.time.paused = true; this.tweens.pauseAll();
    }
    const dim = this.add.rectangle(W/2,CH/2,W,CH,0x000000,0.8).setDepth(200).setInteractive();
    this.menuEls.push(dim);
    const btn = (y,label,cb)=>{
      const t = this.add.text(W/2,y,label,{fontFamily:'monospace',fontSize:'25px',fontStyle:'bold',color:'#ffffff'}).setOrigin(.5).setDepth(201).setInteractive({useHandCursor:true});
      t.on('pointerdown',cb);
      this.menuEls.push(t);
    };
    if (!sel){
      this.menuEls.push(this.add.text(W/2,110,'DURAKLATILDI',{fontFamily:'monospace',fontSize:'19px',color:'#9fb3d9'}).setOrigin(.5).setDepth(201));
      btn(180,'▶  DEVAM ET',            ()=>this.closeMenu());
      btn(240,'⟳  BÖLÜMÜ YENİDEN BAŞLAT',()=>this.gotoLvl(this.lvl));
      btn(300,'☰  BÖLÜM SEÇ',           ()=>{ this.clearMenuEls(); this.openMenu(true); });
      btn(360,'⌂  EN BAŞTAN (1. BÖLÜM)', ()=>this.gotoLvl(1));
    } else {
      const mx = Math.max(this.lvl, ld('max',1));
      const start = Math.max(1, mx-39); // son 40 bolum listelenir
      this.menuEls.push(this.add.text(W/2,96,'BÖLÜM SEÇ',{fontFamily:'monospace',fontSize:'19px',color:'#9fb3d9'}).setOrigin(.5).setDepth(201));
      let i=0;
      for (let n=start; n<=mx; n++){
        const col=i%8, row=Math.floor(i/8); i++;
        const t = this.add.text(120+col*80, 160+row*54, ''+n,
          {fontFamily:'monospace',fontSize:'22px',fontStyle:'bold',color:n===this.lvl?'#ffd35a':'#ffffff'})
          .setOrigin(.5).setDepth(201).setInteractive({useHandCursor:true});
        t.on('pointerdown', ()=>this.gotoLvl(n));
        this.menuEls.push(t);
      }
      btn(H-14,'← GERİ', ()=>{ this.clearMenuEls(); this.openMenu(false); });
    }
  }

  closeMenu(){
    this.clearMenuEls();
    this.paused = false;
    this.physics.resume(); this.time.paused = false; this.tweens.resumeAll();
  }

  gotoLvl(n){
    sv('lvl',n); this.registry.set('lvl',n);
    this.closeMenu();
    this.scene.restart();
  }

  // dokunmatik butonlar: kontrol seridi (oyun alaninin altinda), solda yon, sagda ziplama
  mkButtons(){
    const by = (H+CH)/2;
    this.add.rectangle(W/2, by, W, CH-H, 0x0a0e1c).setDepth(80);
    this.add.rectangle(W/2, H+1, W, 2, 0x2a3550).setDepth(81);
    const mk = (x,label)=>{
      const c = this.add.circle(x,by,44,0xffffff,0.10).setDepth(90);
      c.setStrokeStyle(2,0xffffff,0.25);
      this.add.text(x,by,label,{fontFamily:'monospace',fontSize:'32px',fontStyle:'bold',color:'#ffffff'}).setOrigin(.5).setDepth(91).setAlpha(.55);
      c.setInteractive(new Phaser.Geom.Circle(44,44,60), Phaser.Geom.Circle.Contains);
      return c;
    };
    const hold = (c,set)=>{
      const off = p=>{ if (c._pid===p.id){ c._pid=null; set(false); c.setFillStyle(0xffffff,0.10); } };
      c.on('pointerdown', p=>{ c._pid=p.id; set(true); c.setFillStyle(0xffffff,0.28); });
      c.on('pointerup', off); c.on('pointerout', off);
      this.input.on('pointerup', off);
    };
    hold(mk(64,'◀'),  v=>this.touch.l=v);
    hold(mk(172,'▶'), v=>this.touch.r=v);
    const j = mk(732,'⬆');
    j.on('pointerdown', ()=>{ this.jpress = true; j.setFillStyle(0xffffff,0.28); });
    const joff = ()=>j.setFillStyle(0xffffff,0.10);
    j.on('pointerup', joff); j.on('pointerout', joff);
  }

  update(){
    if (this.dead || this.won || this.paused) return;
    const b = this.player.body;
    const K = Phaser.Input.Keyboard;

    let dir = 0;
    if (this.cursors.left.isDown  || this.keys.A.isDown) dir -= 1;
    if (this.cursors.right.isDown || this.keys.D.isDown) dir += 1;
    if (this.touch.l) dir -= 1;
    if (this.touch.r) dir += 1;
    dir = Phaser.Math.Clamp(dir,-1,1);
    let press = K.JustDown(this.cursors.up) || K.JustDown(this.keys.W) || K.JustDown(this.keys.SPACE) || this.jpress;
    this.jpress = false;

    // gecikmeli kontrol: girdiler kuyruga yazilir, lagMs sonra uygulanir
    if (this.lagMs > 0 || this.inputQ.length){
      this.inputQ.push({t:this.time.now, d:dir, p:press});
      dir = 0; press = false;
      while (this.inputQ.length && this.inputQ[0].t <= this.time.now - this.lagMs){
        const r = this.inputQ.shift();
        dir = r.d; if (r.p) press = true;
      }
    }

    if (this.rev) dir *= -1;
    b.setVelocityX(dir*SPEED);
    if (press) this.jq = this.time.now;
    const grounded = this.gdir>0 ? (b.blocked.down||b.touching.down) : (b.blocked.up||b.touching.up);
    if (grounded) this.coyote = this.time.now;
    if (this.jq && this.time.now-this.jq<140 && this.time.now-this.coyote<100){
      b.setVelocityY(-JUMPV*this.jumpMul*this.gdir); this.jq = 0;
    }

    if (this.player.y > H+60 || this.player.y < -60) return this.die();
    for (let i=0;i<this.updaters.length;i++) this.updaters[i]();
  }

  // ---- olum / kazanma ----
  die(){
    if (this.dead || this.won) return;
    this.dead = true;
    DEATHS++; sv('deaths',DEATHS); this.deathTxt.setText('💀 '+DEATHS);
    try{
      if (navigator.vibrate) navigator.vibrate(60);
      if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }catch(e){}
    this.player.setTintFill(0xff5566);
    this.player.body.enable = false;
    this.cameras.main.shake(100,0.008);
    this.cameras.main.flash(120,255,60,70);
    this.time.delayedCall(200, ()=>this.scene.restart());
  }

  win(d){
    if (this.dead || this.won) return;
    if (d && d._fake){ if (!d._used) this.fakeSeq(d); return; } // sahte kapi ASLA kazandirmaz
    if (d && d._fleeing) return;                                // kacis sirasinda carpma kazandirmaz
    if (this.doorFlee && this.doorFlee.n > 0) return;
    if (this._lock > 0){ // anahtar dugmelerine basilmadan kapi acilmaz
      if (this.time.now > this._lockCd){ this._lockCd = this.time.now+800; this.toast('KİLİTLİ 🔒 anahtar kaldı: '+this._lock); }
      return;
    }
    if (SBX){ // test kumunda ilerleme kaydedilmez
      this.won = true;
      this.cameras.main.flash(200,60,220,120);
      this.time.delayedCall(500, ()=>this.scene.restart());
      return;
    }
    this.won = true;
    const nl = this.lvl+1;
    this.registry.set('lvl',nl); sv('lvl',nl);
    if (nl > ld('max',1)) sv('max',nl);
    this.player.body.setVelocityX(0);
    this.cameras.main.flash(200,60,220,120);
    const t = this.add.text(W/2,200,'BÖLÜM '+this.lvl+' ✔',{fontFamily:'monospace',fontSize:'36px',fontStyle:'bold',color:'#7cfc9a'}).setOrigin(.5).setDepth(100).setScale(.3);
    this.tweens.add({targets:t,scale:1,duration:180,ease:'Back.easeOut'});
    try{ if (navigator.vibrate) navigator.vibrate(30); }catch(e){}
    this.time.delayedCall(520, ()=>this.scene.restart());
  }

  toast(msg){
    const t = this.add.text(W/2,140,msg,{fontFamily:'monospace',fontSize:'26px',fontStyle:'bold',color:'#ffd35a'}).setOrigin(.5).setDepth(100);
    this.tweens.add({targets:t,alpha:0,delay:650,duration:300,onComplete:()=>t.destroy()});
  }

  hint(){
    const msg = TOUCH
      ? 'Sol: ◀ ▶ yön tuşları | Sağ: ⬆ zıplama'
      : '← → / A D : hareket | SPACE : zıpla';
    const t = this.add.text(W/2,86,msg,{fontFamily:'monospace',fontSize:'15px',color:'#9fb3d9',align:'center'}).setOrigin(.5).setDepth(100);
    this.tweens.add({targets:t,alpha:0,delay:3500,duration:600});
  }

  // ---- Yapi yardimcilari ----
  plat(x,y,w,h,color){
    const r = this.add.rectangle(x+w/2, y+h/2, w, h, color==null?PCOL:color).setDepth(1);
    if (h < 20) r.setStrokeStyle(1, 0x66799e, 0.7); // kalin zeminde cizgi yok: parcalar dikissiz birlesir, tuzaklar belli olmaz
    this.physics.add.existing(r);
    r.body.setAllowGravity(false); r.body.setImmovable(true);
    this.solids.add(r);
    return r;
  }

  mkSpike(x,y,down){
    const sp = this.add.image(x,y,'spike').setDepth(0);
    if (down) sp.setFlipY(true);
    this.physics.add.existing(sp);
    sp.body.setAllowGravity(false); sp.body.setImmovable(true);
    sp.body.setSize(12,10);
    this.physics.add.overlap(this.player, sp, ()=>this.die());
    return sp;
  }

  // y = zemin ustu (dir 1) veya tavan alti (dir -1)
  spikeRow(x,y,n,dir){
    const a=[]; dir = dir||1;
    for (let i=0;i<n;i++) a.push(this.mkSpike(x+10+i*20, y-9*dir, dir<0));
    return a;
  }

  mkDoor(x,gy){
    const d = this.physics.add.image(x, gy-24, 'door').setDepth(1);
    d.body.setAllowGravity(false); d.body.setImmovable(true);
    this.physics.add.overlap(this.player, d, ()=>this.win(d));
    this.door = d;
    return d;
  }

  // cy/chh verilirse tetik sadece o yukseklik bandinda calisir (orn. platformun ustu)
  trigger(x,w,cb,cy,chh){
    const z = this.add.zone(x+w/2, cy==null?H/2:cy, w, chh==null?H+300:chh);
    this.physics.add.existing(z);
    z.body.setAllowGravity(false); z.body.moves = false;
    this.physics.add.overlap(this.player, z, ()=>{
      if (z._f) return; z._f = true; cb();
    });
    return z;
  }

  // ---- Tuzak mekanikleri (havuz: her biri bagimsiz) ----
  // 1) Kayan zemin: basinca yuk altinda hafif coker, sonra altindan kayarak duser (titreme yok)
  fallPlat(x,y,w,h,delay,color){
    const p = this.plat(x,y,w,h,color);
    p._orig = {x:x, y:y, w:w, h:h};
    p._onStand = (ob)=>{
      if (ob._t) return; ob._t = true;
      const d = delay==null?150:delay;
      this.tweens.add({targets:ob,y:ob.y+4,duration:d,ease:'Sine.easeIn'});
      this.time.delayedCall(d, ()=>{
        if (!ob.body) return;
        ob.body.checkCollision.none = true;
        this.consumed.push({o:ob._orig, ob:ob});
        this.tweens.add({targets:ob,y:ob.y+300,alpha:0.35,duration:650,ease:'Quad.easeIn'});
      });
    };
    return p;
  }

  // 2) Firlayan dikenler: tetik bolgesinden gecince yerden cikar
  popSpikes(x,gy,n,tx,tw,delay,ty,th){
    const arr=[];
    for (let i=0;i<n;i++){
      const sp = this.mkSpike(x+10+i*20, gy+16, false);
      sp.setAlpha(0); sp.body.enable = false; sp.setDepth(0);
      arr.push(sp);
    }
    this.trigger(tx, tw||30, ()=>{
      this.time.delayedCall(delay==null?140:delay, ()=>{
        arr.forEach(sp=>{
          sp.setAlpha(1); sp.body.enable = true;
          this.tweens.add({targets:sp,y:gy-9,duration:80});
        });
        this.cameras.main.shake(60,0.003);
      });
    }, ty, th);
  }

  // 10) Gizli cukur: zemin gibi gorunur, basina gelince altindan acilir
  hiddenPit(x,gy,w,h){
    const p = this.plat(x,gy,w,h==null?50:h);
    this.trigger(x-8, 14, ()=>{
      this.time.delayedCall(30, ()=>{
        if (!p.body) return;
        p.body.checkCollision.none = true;
        this.consumed.push({o:{x:x, y:gy, w:w, h:h==null?50:h}, ob:p});
        this.tweens.add({targets:p,y:p.y+180,alpha:0.35,duration:260,ease:'Quad.easeIn'});
        this.cameras.main.shake(50,0.004);
      });
    }, gy-70, 150); // sadece ustunden/hizasindan gecerken; altindan gecmek tetiklemez
    return p;
  }

  // aninda yukselen dikenler (sahte zafer sonrasi vb.)
  instantSpikes(x,gy,n){
    for (let i=0;i<n;i++){
      const sp = this.mkSpike(x+10+i*20, gy+16, false);
      this.tweens.add({targets:sp,y:gy-9,duration:120,delay:i*30});
    }
  }

  // 3) Ters kontroller
  reverseAt(tx,show,cy,chh){
    this.trigger(tx, 26, ()=>{
      this.rev = !this.rev;
      if (show) this.toast('KONTROLLER TERS!');
      this.cameras.main.shake(80,0.004);
    }, cy, chh);
  }

  // 4) Yercekimi degisimi
  flipGravity(){
    this.gdir *= -1;
    this.player.body.setGravityY(GRAV*this.gdir);
    this.player.setFlipY(this.gdir<0);
    this.cameras.main.flash(120,140,90,255);
  }
  gravityAt(tx){ this.trigger(tx, 26, ()=>this.flipGravity()); }

  // 5) Karanlik: sadece oyuncunun etrafinda spot isigi kalir
  darknessOn(){
    if (this.darkOn) return; this.darkOn = true;
    const rt = this.add.renderTexture(0,0,W,H).setOrigin(0,0).setDepth(50);
    this.updaters.push(()=>{
      rt.clear();
      rt.fill(0x04060f, 1); // spot disinda tam karanlik
      rt.erase('spot', this.player.x-95, this.player.y-95);
    });
  }
  darknessAt(tx){ this.trigger(tx, 26, ()=>this.darknessOn()); }

  // 6) Kacan kapi: yaklasinca ziplar, n kere sonra yorulur
  fleeingDoor(n,range,hop,minx,maxx){
    this.doorFlee = {n:n, range:range||120, hop:hop||190, cd:0,
                     minx:minx==null?50:minx, maxx:maxx==null?750:maxx};
    this.updaters.push(()=>{
      const d=this.door, f=this.doorFlee;
      if (!d || !f || f.n<=0) return;
      if (Math.abs(this.player.x-d.x)<f.range && Math.abs(this.player.y-d.y)<90 && this.time.now>f.cd){
        f.cd = this.time.now+450; f.n--;
        let nx = d.x + (d.x>=this.player.x ? f.hop : -f.hop);
        if (nx<f.minx || nx>f.maxx) nx = Phaser.Math.Clamp(2*this.player.x-d.x, f.minx, f.maxx);
        // kapi kovalayan duvarin (kirmizi serit) arkasina kacamaz
        let lo=f.minx, hi=f.maxx;
        this.walls.forEach(w=>{ if (!w.body) return; if (w._spd>=0) lo=Math.max(lo,w.x+90); else hi=Math.min(hi,w.x-90); });
        if (lo<hi) nx = Phaser.Math.Clamp(nx, lo, hi);
        d._fleeing = true;
        this.tweens.add({targets:d,x:nx,duration:150,ease:'Quad.easeOut',onComplete:()=>{ d._fleeing=false; }});
        this.tweens.add({targets:d,angle:d.x<nx?8:-8,duration:75,yoyo:true});
        if (f.n===0) this.time.delayedCall(400, ()=>{
          if (d.active) this.tweens.add({targets:d,angle:{from:-5,to:5},duration:60,yoyo:true,repeat:4,onComplete:()=>d.setAngle(0)});
        });
      }
    });
  }

  // 7) Sahte zafer: kapiya dokun, "tebrikler", sonra saka
  fakeWin(realX,gy,arm){
    this.door._fake = true;
    this.door._cfg = {realX:realX, gy:gy, arm:arm||[]};
  }
  fakeSeq(d){
    d._used = true;
    const cfg = d._cfg;
    const t = this.add.text(W/2,170,'TEBRİKLER! 🎉',{fontFamily:'monospace',fontSize:'42px',fontStyle:'bold',color:'#7cfc9a'}).setOrigin(.5).setDepth(100);
    this.time.delayedCall(750, ()=>{
      if (this.dead || this.won){ t.destroy(); return; }
      t.setText('ŞAKA ŞAKA 😈'); t.setColor('#ff6b7a');
      d.body.enable = false;
      this.tweens.add({targets:d,y:d.y+150,alpha:0,duration:400});
      this.mkDoor(cfg.realX, cfg.gy);
      // tuketilen tuzak platformlari eski yerine doner — geri donus yolu garanti
      this.consumed.forEach(c=>{ if (c.ob && c.ob.active) c.ob.destroy(); this.plat(c.o.x, c.o.y, c.o.w, c.o.h); });
      this.consumed = [];
      cfg.arm.forEach(f=>f());
      this.time.delayedCall(900, ()=>{ if (t.active) t.destroy(); });
    });
  }

  // 8) Dikenli duvar: dokunan olur, kovalar
  chaser(x,speed,delay){
    const wl = this.add.rectangle(x, H/2, 30, H-10, 0xd23c50).setDepth(2);
    wl.setStrokeStyle(2, 0xff7a8a, 0.9);
    this.physics.add.existing(wl);
    wl.body.setAllowGravity(false); wl.body.setImmovable(true);
    this.physics.add.overlap(this.player, wl, ()=>this.die());
    wl._spd = speed; this.walls.push(wl);
    this.time.delayedCall(delay==null?500:delay, ()=>{
      if (!this.dead && !this.won && wl.body) wl.body.setVelocityX(speed);
    });
    return wl;
  }

  // 9) Kuculen platform: basinca erimeye baslar
  shrinkPlat(x,y,w,h){
    const p = this.plat(x,y,w,h||14);
    p._onStand = (ob)=>{
      if (ob._s) return; ob._s = true;
      this.consumed.push({o:{x:x, y:y, w:w, h:h||14}, ob:ob});
      this.tweens.add({targets:ob,displayWidth:Math.max(14,w*0.14),duration:900,ease:'Sine.easeIn'});
    };
    return p;
  }

  // ---- FAZ 2 mekanikleri ----
  // 11) Gecikmeli kontrol: girdiler lagMs (vars. 500ms) sonra uygulanir
  lagOn(ms){
    if (this.lagMs > 0) return;
    this.lagMs = ms==null?500:ms;
    this.toast('SİNYAL GECİKMESİ! ⌛');
    this.cameras.main.flash(120,150,80,255);
    const ring = this.add.circle(this.player.x,this.player.y,24,0x000000,0).setDepth(3);
    ring.setStrokeStyle(3,0xb07cff,0.9);
    this.lagRing = ring;
    this.tweens.add({targets:ring,alpha:0.35,duration:400,yoyo:true,repeat:-1});
    this.updaters.push(()=>{ if (this.lagRing) this.lagRing.setPosition(this.player.x,this.player.y); });
  }
  lagOff(){
    if (this.lagMs === 0) return;
    this.lagMs = 0; this.inputQ.length = 0;
    if (this.lagRing){ this.lagRing.destroy(); this.lagRing = null; }
    this.toast('SİNYAL GERİ GELDİ! ✓');
  }
  lagAt(tx){ this.trigger(tx, 26, ()=>this.lagOn()); }

  // 12) Golge takipci: gecmis hareketleri birebir tekrar eden kopya(lar)
  mkShadow(df){
    const spr = this.physics.add.image(this.recBuf[0].x, this.recBuf[0].y, 'hero')
      .setDepth(1).setTintFill(0x11142e).setAlpha(0);
    spr.body.setAllowGravity(false); spr.body.setSize(14,20); // hosgorulu vurus kutusu
    const sh = {spr:spr, df:df, born:this.time.now};
    this.physics.add.overlap(this.player, spr, ()=>{
      if (sh.spr.alpha < 0.35 || this.time.now - sh.born < 500) return; // dogum korumasi
      this.die();
    });
    this.shadows.push(sh);
  }
  shadowsOn(n, stepMs){
    const step = stepMs==null?3000:stepMs;
    for (let i=1;i<=(n==null?1:n);i++) this._shadowSpecs.push(Math.round(step*i/16.7));
    this._shadowSpecs.sort((a,b)=>a-b);
    this.toast('GÖLGEN PEŞİNDE! 👻');
    if (this._shadowRec) return;
    this._shadowRec = true;
    this.updaters.push(()=>{
      // kayit kare tabanli: duraklatmada da tutarli kalir
      this.recBuf.push({x:this.player.x, y:this.player.y, fy:this.player.flipY});
      if (this.recBuf.length > 1200) this.recBuf.shift();
      while (this._shadowSpecs.length && this.recBuf.length > this._shadowSpecs[0]+2)
        this.mkShadow(this._shadowSpecs.shift());
      for (let k=0;k<this.shadows.length;k++){
        const sh = this.shadows[k], idx = this.recBuf.length-1-sh.df;
        if (idx < 0) continue;
        const r = this.recBuf[idx];
        sh.spr.setPosition(r.x, r.y).setFlipY(r.fy);
        if (sh.spr.alpha < 0.55) sh.spr.setAlpha(Math.min(0.55, sh.spr.alpha+0.02));
      }
    });
  }
  shadowAt(tx,n,step){ this.trigger(tx, 26, ()=>this.shadowsOn(n,step)); }

  // 13) Yercekimi cukuru: dikensiz sahte cukur — dusen olmez, ters dunyaya gecer
  gravZone(x,y,w,h){
    const z = this.add.zone(x+w/2, y+h/2, w, h);
    this.physics.add.existing(z);
    z.body.setAllowGravity(false); z.body.moves = false;
    this.physics.add.overlap(this.player, z, ()=>{
      if (this.time.now < this._gvcd) return;
      this._gvcd = this.time.now + 600;
      this.flipGravity();
      this.player.body.setVelocityY(250*this.gdir); // cukurdan disari itis
    });
    return z;
  }
  gravPit(x,gy,w){ return this.gravZone(x+8, gy+18, Math.max(20,w-16), 44); }

  // 14) Boyut butonu: mode 'small' | 'big' | 'reset' (+extra: gizli tuzak cb)
  heroSize(mode){
    const sc = mode==='small'?0.55 : mode==='big'?1.6 : 1;
    this.player.setScale(sc);
    this.player.body.setSize(Math.round(22*sc), Math.round(28*sc));
    this.jumpMul = mode==='small'?0.85 : 1;
    this.cameras.main.flash(100,120,200,255);
    this.toast(mode==='small'?'KÜÇÜLDÜN! 🐜' : mode==='big'?'DEVLEŞTİN! 🦖' : 'NORMALE DÖNDÜN');
  }
  sizeBtn(x,gy,mode,extra){
    this.plat(x,gy-8,34,8,0x2a3550);
    const cap = this.add.rectangle(x+17,gy-12,22,8, mode==='big'?0xe0793f:0x4fc3e0).setDepth(1);
    this.physics.add.existing(cap);
    cap.body.setAllowGravity(false); cap.body.setImmovable(true);
    this.solids.add(cap);
    cap._onStand = (ob)=>{
      if (this.time.now < (ob._cd||0)) return; // tekrar kullanilabilir (geri donus yollari icin)
      ob._cd = this.time.now + 900;
      this.tweens.add({targets:ob,y:ob.y+4,duration:80,yoyo:true});
      this.heroSize(mode);
      if (extra && !ob._x){ ob._x = true; extra(); }
    };
    return cap;
  }

  // 15) Kayan kapak: zemin gibi; ustune basinca yana kayar, altindan cukur acilir
  slideCover(x,gy,w,dir){
    const p = this.plat(x,gy,w,50);
    p._onStand = (ob)=>{
      if (ob._c) return; ob._c = true;
      this.time.delayedCall(110, ()=>{
        if (!ob.body) return;
        this.consumed.push({o:{x:x,y:gy,w:w,h:50}, ob:ob});
        this.tweens.add({targets:ob, x:ob.x+(dir==null?1:dir)*(w+6), duration:230, ease:'Quad.easeIn'});
        this.cameras.main.shake(60,0.004);
      });
    };
    return p;
  }

  // 16) Pusu blogu: tetik gecilince beliren blok oyuncuyu iter (ty/th: tetik bandi)
  ambushBlock(bx,gy,tx,dir,speed,ty,th){
    this.trigger(tx, 26, ()=>{
      const bl = this.add.rectangle(bx, gy-30, 34, 58, 0x8a5cd6).setDepth(2);
      this.physics.add.existing(bl);
      bl.body.setAllowGravity(false); bl.body.setImmovable(true);
      this.solids.add(bl);
      bl.setScale(0.2);
      this.tweens.add({targets:bl,scaleX:1,scaleY:1,duration:130});
      this.cameras.main.shake(60,0.004);
      this.time.delayedCall(170, ()=>{ if (bl.body) bl.body.setVelocityX((dir==null?1:dir)*(speed||330)); });
      this.time.delayedCall(1900, ()=>{
        if (!bl.body) return;
        bl.body.setVelocityX(0);
        this.tweens.add({targets:bl,alpha:0,duration:300,onComplete:()=>{ if (bl.active) bl.destroy(); }});
      });
    }, ty, th);
  }

  // 17) Illuzyon kaya: dusen dev tas — sahte, dokunmaz (ty/th: tetik bandi)
  fakeBoulder(tx,bx,gy,ty,th){
    this.trigger(tx, 26, ()=>{
      const g = this.add.circle(bx, -60, 34, 0x7d8aa8).setDepth(5);
      g.setStrokeStyle(3,0x59637f,1);
      this.tweens.add({targets:g, y: gy-34, duration:480, ease:'Quad.easeIn', onComplete:()=>{
        this.cameras.main.shake(90,0.006);
        this.tweens.add({targets:g, alpha:0, duration:600, delay:450, onComplete:()=>{ if (g.active) g.destroy(); }});
      }});
    }, ty, th);
  }

  // 18) Gorunmez platform: dikenlerin ustunde; basinca kisa sure belirir
  ghostPlat(x,y,w){
    const p = this.plat(x,y,w,12);
    p.setAlpha(0.02);
    p._onStand = (ob)=>{
      if (ob._g) return; ob._g = true;
      ob.setAlpha(0.5);
      this.tweens.add({targets:ob, alpha:0.12, duration:500, delay:250, onComplete:()=>{ ob._g = false; }});
    };
    return p;
  }

  // 19) Anahtar dugmesi: tum anahtarlara basilmadan kapi acilmaz (win icindeki _lock)
  // inv=true: tavana ters monte — sadece bas asagi (ters dunya) basilabilir
  keyPad(x,gy,inv){
    this._lock++;
    this.plat(x, inv?gy:gy-8, 34, 8, 0x2a3550);
    const cap = this.add.rectangle(x+17, inv?gy+12:gy-12, 22, 8, 0xffd35a).setDepth(1);
    this.physics.add.existing(cap);
    cap.body.setAllowGravity(false); cap.body.setImmovable(true);
    this.solids.add(cap);
    cap._onStand = (ob)=>{
      if (ob._u) return; ob._u = true;
      this._lock--;
      ob.setFillStyle(0x53e6a8);
      this.tweens.add({targets:ob,y:ob.y+4,duration:90});
      this.toast(this._lock>0 ? 'ANAHTAR ✔ (kalan: '+this._lock+')' : 'KAPI AÇILDI! 🔓');
    };
    return cap;
  }

  // 20) Sahte gecit: kat gecidine yaklasinca kapanir, zit tarafta acilir (swaps kez)
  fakeGate(fy,gapW,leftX,rightX,startSide,swaps){
    const st = {side:(startSide||'R'), swaps:(swaps==null?1:swaps)};
    const wallL = this.plat(leftX, fy, gapW, 14);
    const wallR = this.plat(rightX, fy, gapW, 14);
    const cell = sd => sd==='L'?wallL:wallR;
    const open = sd => { const w=cell(sd); w.body.checkCollision.none = true;  this.tweens.add({targets:w,alpha:0,duration:140}); };
    const close = sd => { const w=cell(sd); w.body.checkCollision.none = false; w.setAlpha(0); this.tweens.add({targets:w,alpha:1,duration:140}); this.cameras.main.shake(60,0.004); };
    open(st.side);
    this.updaters.push(()=>{
      if (st.swaps <= 0) return;
      const gx = (st.side==='L'?leftX:rightX)+gapW/2;
      // oyuncu gecidin oldugu katin ALTINDA ve gecide yaklasti mi?
      if (this.player.y > fy+14 && this.player.y < fy+120 && Math.abs(this.player.x-gx) < 70){
        st.swaps--; close(st.side);
        st.side = st.side==='L'?'R':'L';
        open(st.side);
        this.toast('GEÇİT KAÇTI! 😈');
      }
    });
    return st;
  }

  // 21) Yukselen lav: topY'den toTopY'ye yukselir, dokunan olur
  lavaRise(topY,toTopY,dur,delay){
    const hh = 520;
    const lv = this.add.rectangle(W/2, topY+hh/2, W, hh, 0xd2483c, 0.9).setDepth(4);
    this.physics.add.existing(lv);
    lv.body.setAllowGravity(false); lv.body.setImmovable(true);
    this.physics.add.overlap(this.player, lv, ()=>this.die());
    this.time.delayedCall(delay==null?0:delay, ()=>{
      if (!this.dead && !this.won && lv.body)
        this.tweens.add({targets:lv, y: toTopY+hh/2, duration:dur, ease:'Linear'});
    });
    return lv;
  }
}

// ---- Sonsuz mod (bolum 16+): prosedurel uretim ----
// Havuz: ogretilen mekanikler bolum ilerledikce acilir ("ogret ve kombine et")
const POOL = ['fall','pop','rev','grav','dark','flee','shrink','fake','wall','pit'];
function poolFor(lvl){
  const p = POOL.slice();
  if (lvl>=21) p.push('lag');              // 20'de ogretildi
  if (lvl>=26) p.push('shadow');           // 25'te ogretildi
  if (lvl>=32) p.push('slide','ambush','keys'); // 30-31'de ogretildi
  if (lvl>=36) p.push('boulder','ghostway');    // 33-35'te ogretildi
  return p;
}
const mechCache = {};

// Son 3 bolumun mekaniklerini deterministik takip eder (seed tabanli, memoize)
function pickMechs(lvl){
  if (mechCache[lvl]) return mechCache[lvl];
  const rnd = mulberry32(lvl*7919+3);
  const recent = new Set();
  for (let p=Math.max(16,lvl-3); p<lvl; p++) pickMechs(p).forEach(m=>recent.add(m));
  const diff = Math.min(1,(lvl-15)/45);
  const k = Math.min(4, 2+Math.floor(diff*2+rnd()*1.5));
  const scored = poolFor(lvl).map(m=>({m:m, s:(recent.has(m)?1:0)+rnd()})).sort((a,b)=>a.s-b.s);
  let res = scored.slice(0,k).map(o=>o.m);
  // uyumsuz ikilileri ele
  if (res.includes('grav') && res.includes('fake')) res = res.filter(m=>m!=='fake');
  if (res.includes('fake') && res.includes('flee')) res = res.filter(m=>m!=='flee');
  if (res.includes('lag') && res.includes('rev')) res = res.filter(m=>m!=='rev');      // ikisi birden kontrol bozar: haksiz
  if (res.includes('lag') && res.includes('flee')) res = res.filter(m=>m!=='flee');    // lagli kapi kovalamak iskence
  if (res.includes('shadow') && res.includes('dark')) res = res.filter(m=>m!=='dark'); // golge karanlikta gorunmez: haksiz
  if (res.includes('ghostway') && res.includes('dark')) res = res.filter(m=>m!=='ghostway');
  mechCache[lvl] = res;
  return res;
}

function genLevel(s,lvl){
  const rnd = mulberry32((Math.imul(lvl,2654435761)>>>0)%4294967295+1);
  const diff = Math.min(1,(lvl-15)/45); // zorluk 60. bolumde tavana ulasir, sabitlenir
  const mechs = pickMechs(lvl);

  // her 5 bolumde bir: prosedurel kule (40, 45, 50, ...)
  if (lvl>=40 && lvl%5===0) return genTower(s,lvl,rnd,diff);

  // bolum basina hafif renk varyasyonu (gorsel cesitlilik)
  const bgs = [0x10142a, 0x140f24, 0x0e1a22, 0x180f1e, 0x0d1526];
  s.cameras.main.setBackgroundColor(bgs[lvl%5]);

  // iki oda tipi: duz zeminli koridor (gizli cukurlar) veya platform zinciri
  if (rnd() < 0.35) return genGround(s,lvl,rnd,diff,mechs);

  // yukseklik profili: 0 zigzag, 1 tirmanis, 2 inis (yukaridan baslar)
  const profile = Math.floor(rnd()*3);
  let y = (profile===2) ? 190 : 400;
  const plan = [{x:0, y:y, w:120+Math.round(rnd()*40), t:'n'}];
  let x = plan[0].w;
  while (x < 600){
    let ny;
    if (profile===1)      ny = y - (15+rnd()*70);
    else if (profile===2) ny = y + (15+rnd()*70);
    else                  ny = y + Math.round(rnd()*170-85);
    ny = Math.max(140, Math.min(390, Math.round(ny)));
    if (y-ny > 85) ny = y-85;
    // yukari sicramalarda menzil kisalir: bosluk yukselise gore sinirlanir
    const rise = y-ny;
    const maxgap = rise>70 ? 80 : rise>40 ? 110 : 145;
    const gap = Math.min(maxgap, 50+rnd()*(40+55*diff));
    let w = Math.max(46, 115-58*diff+rnd()*50);
    x += gap;
    if (x+w > 790) w = 790-x;
    if (w < 46){ x = 790-70; w = 70; }
    plan.push({x:x, y:ny, w:w, t:'n'});
    x += w; y = ny;
  }
  const last = plan[plan.length-1];
  if (last.w < 60){ last.w = 70; last.x = Math.min(last.x, 800-last.w); }
  s.player.setPosition(46, plan[0].y-22);

  // coken / kuculen / gizli-cukur atamalari (ilk ve son platform haric)
  const mids = [];
  for (let i=1;i<plan.length-1;i++) mids.push(i);
  function pickN(n){
    const out=[], c = mids.filter(i=>plan[i].t==='n');
    while (n-->0 && c.length){ const j=Math.floor(rnd()*c.length); out.push(c[j]); c.splice(j,1); }
    return out;
  }
  if (mechs.includes('fall'))   pickN(1+Math.round(diff*2)).forEach(i=>plan[i].t='fall');
  if (mechs.includes('shrink')) pickN(1+Math.round(diff)).forEach(i=>plan[i].t='shrink');
  if (mechs.includes('pit'))    pickN(1+Math.round(diff)).forEach(i=>plan[i].t='pit');
  if (mechs.includes('ghostway')) pickN(1+Math.round(diff)).forEach(i=>plan[i].t='ghost');

  // platformlari kur
  plan.forEach((p,i)=>{
    const h = (i===0) ? 50 : 14;
    if (p.t==='fall') s.fallPlat(p.x,p.y,p.w,h,Math.round(300-120*diff));
    else if (p.t==='shrink') s.shrinkPlat(p.x,p.y,p.w,h);
    else if (p.t==='pit') s.hiddenPit(p.x,p.y,p.w,h);
    else if (p.t==='ghost') s.ghostPlat(p.x,p.y,p.w);
    else s.plat(p.x,p.y,p.w,h);
  });
  if (plan.some(p=>p.t==='ghost') && lvl<45)
    s.time.delayedCall(600, ()=>s.toast('GÖRÜNMEZ YOL VAR... 👀'));

  // dip dikenleri (dusus = olum sinyali)
  s.spikeRow(0,452,40,1);

  // kapi son platformda
  s.mkDoor(Math.min(770, last.x+last.w-26), last.y);

  // diger mekanikler
  if (mechs.includes('pop')){
    const cands = mids.filter(i=>plan[i].w>=80 && plan[i].t==='n');
    const cnt = Math.min(cands.length, 1+Math.round(diff));
    for (let c=0;c<cnt && cands.length;c++){
      const j = Math.floor(rnd()*cands.length);
      const p = plan[cands[j]]; cands.splice(j,1);
      s.popSpikes(p.x+p.w-46, p.y, 2, p.x+4, 26, 130, p.y-70, 150);
    }
  }
  if (mechs.includes('rev')){
    // ilk iki platform haric; sadece o platformun yuzeyinde tetiklenir (havada/ilk ziplamada degil)
    const lo2 = Math.min(2, plan.length-2);
    const mp = plan[lo2+Math.floor(rnd()*Math.max(1,plan.length-1-lo2))];
    s.reverseAt(mp.x+mp.w/2, lvl<26, mp.y-24, 48);
  }
  if (mechs.includes('dark')) s.darknessAt(170);
  if (mechs.includes('flee') && last.w>=120)
    s.fleeingDoor(1+Math.round(diff*2), 110, 120, last.x+18, Math.min(776,last.x+last.w-18));
  // NOT: platform zincirinde 'fake' yok — geri donus ziplamalari fiziksel olarak
  // imkansiz olabildigi icin sahte kapi sadece duz koridor (genGround) tipinde kalir
  if (mechs.includes('wall')) s.chaser(-50, 100+90*diff, 900);
  if (mechs.includes('lag'))    s.lagAt(plan[1].x+10);
  if (mechs.includes('shadow')) s.shadowAt(Math.max(60,plan[1].x-20), 1+Math.round(diff), 2800);
  if (mechs.includes('boulder')){ const bp = plan[Math.floor(plan.length/2)]; s.fakeBoulder(bp.x-40, bp.x+bp.w/2, bp.y); }
  if (mechs.includes('keys'))   pickN(1+Math.round(diff)).forEach(i=>s.keyPad(plan[i].x+plan[i].w/2-17, plan[i].y));
  if (mechs.includes('grav')){
    s.plat(0,0,800,20);
    const t1 = plan[1].x-20, t2 = Math.max(plan[1].x+80, last.x-60);
    const nsp = 2+Math.round(diff*2);
    for (let c=0;c<nsp;c++){
      const sx = 150+Math.floor(rnd()*450);
      if (Math.abs(sx-t1)>70 && Math.abs(sx-t2)>70) s.spikeRow(sx,20,2,-1);
    }
    s.gravityAt(t1); s.gravityAt(t2);
  }
}

// duz zeminli koridor: gizli cukurlar + engel dikenleri
function genGround(s,lvl,rnd,diff,mechs){
  const npits = 2+Math.round(diff*2+rnd());
  const pits = [];
  let px = 150+rnd()*90;
  while (pits.length<npits && px<600){
    pits.push({x:Math.round(px), w:Math.round(85+rnd()*(30+25*diff))});
    px += 170+rnd()*130;
  }
  // zemin parcalari (cukur aralari dolu) — 'slide' varsa ilk cukur kayan kapak olur
  let cur = 0, slid = false;
  pits.forEach(p=>{
    s.plat(cur,400,p.x-cur,50);
    if (!slid && mechs.includes('slide')){ slid = true; s.slideCover(p.x,400,p.w, rnd()<0.5?-1:1); }
    else s.hiddenPit(p.x,400,p.w);
    s.spikeRow(p.x+2,452,Math.floor(p.w/20),1);
    cur = p.x+p.w;
  });
  s.plat(cur,400,800-cur,50);

  // gorunur engel dikenleri (cukurlardan uzakta)
  const nh = 1+Math.round(rnd()+diff);
  for (let i=0;i<nh;i++){
    const hx = 120+Math.floor(rnd()*560);
    if (!pits.some(p=>hx>p.x-70 && hx<p.x+p.w+50)) s.spikeRow(hx,400,2,1);
  }

  s.mkDoor(756,400);

  if (mechs.includes('pop')){
    const tx = 200+Math.floor(rnd()*380);
    if (!pits.some(p=>tx+40>p.x-60 && tx+40<p.x+p.w+40))
      s.popSpikes(tx+70,400,2,tx,26,140, 330,150);
  }
  if (mechs.includes('rev'))  s.reverseAt(260+Math.floor(rnd()*220), lvl<26);
  if (mechs.includes('dark')) s.darknessAt(160);
  if (mechs.includes('flee')) s.fleeingDoor(1+Math.round(diff*2), 115, 170, 50, 750);
  if (mechs.includes('fake'))
    s.fakeWin(60, 400, [()=>s.instantSpikes(360,400,3), ()=>s.chaser(830, -(110+80*diff), 200)]);
  if (mechs.includes('wall')) s.chaser(-50, 110+90*diff, 800);
  if (mechs.includes('grav')){
    // duz koridorda yercekimi yerine kapi onunde surpriz diken
    if (!pits.some(p=>680>p.x-60 && 680<p.x+p.w+40))
      s.popSpikes(680,400,2,636,26,120, 330,150);
  }
  if (mechs.includes('lag'))    s.lagAt(170+Math.floor(rnd()*140));
  if (mechs.includes('shadow')) s.shadowAt(150, 1+Math.round(diff), 2800);
  if (mechs.includes('ambush')){
    const ax = 200+Math.floor(rnd()*300);
    if (!pits.some(p=>ax>p.x-90 && ax<p.x+p.w+90)) s.ambushBlock(ax-64, 400, ax, 1, 300+80*diff);
  }
  if (mechs.includes('boulder')){
    const tbx = 230+Math.floor(rnd()*250);
    s.fakeBoulder(tbx, tbx+70, 400);
  }
  if (mechs.includes('keys')){
    for (let c=0;c<1+Math.round(diff);c++){
      const kx = 180+Math.floor(rnd()*420);
      if (!pits.some(p=>kx+34>p.x-10 && kx<p.x+p.w+10)) s.keyPad(kx,400);
    }
  }
}

// ---- Prosedurel kule (40, 45, 50, ...): sahte gecitler + lav + kat mekanikleri ----
function genTower(s,lvl,rnd,diff){
  s.cameras.main.setBackgroundColor(0x160f26);
  s.plat(0,400,800,50);
  const kx = rnd()<0.5?170:600;   // anahtar konumu (220 plakasi)
  const dx = rnd()<0.5?170:610;   // kapi konumu (130 plakasi)
  [310,220,130].forEach(y=>{
    s.plat(0,y,60,14); s.plat(130,y,540,14); s.plat(740,y,60,14);
    s.fakeGate(y,70,60,670, rnd()<0.5?'L':'R', (diff>0.8 && rnd()<0.5)?2:1);
    // yuzey dikenleri (gecitlerden, anahtardan ve kapidan uzak sabit yuvalar)
    const slots = [180,270,360,450,540].filter(x=>
      !(y===220 && Math.abs(x-kx)<80) && !(y===130 && Math.abs(x-dx)<80));
    const n = Math.min(slots.length, 1+Math.round(rnd()+diff));
    for (let c=0;c<n;c++){
      const j = Math.floor(rnd()*slots.length);
      s.spikeRow(slots[j], y, 2, 1); slots.splice(j,1);
    }
  });
  s.spikeRow(200+Math.floor(rnd()*300),400,2,1);
  // kat 2'ye cikinca lav yukselmeye baslar; en ust kat guvenli kalir
  s.trigger(0,800,()=>{ s.lavaRise(452,150,Math.round(26000-9000*diff)); s.toast('LAV! YUKARI KAÇ ⏫'); }, 296,20);
  // kat mekanikleri: 220 plakasinda lag, 130 plakasinda golge (45+)
  s.trigger(0,800,()=>s.lagOn(), 206,20);
  if (lvl>=45) s.trigger(0,800,()=>s.shadowsOn(1,3000), 116,20);
  if (diff>0.6) s.keyPad(kx,220);
  s.mkDoor(dx,130);
}
